<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Microphone head (pill shape with grille) -->
  <defs>
    <linearGradient id="mic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0d8d0"/>
      <stop offset="40%" stop-color="#c0b8b0"/>
      <stop offset="100%" stop-color="#8a8280"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8b04a"/>
      <stop offset="100%" stop-color="#c47d28"/>
    </linearGradient>
  </defs>
  <!-- Mic head -->
  <ellipse cx="32" cy="20" rx="14" ry="18" fill="url(#mic)" stroke="#7a7270" stroke-width="1.5"/>
  <!-- Grille lines -->
  <line x1="22" y1="12" x2="42" y2="12" stroke="#9a9590" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="16" x2="44" y2="16" stroke="#9a9590" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="20" x2="44" y2="20" stroke="#9a9590" stroke-width="0.8" opacity="0.6"/>
  <line x1="20" y1="24" x2="44" y2="24" stroke="#9a9590" stroke-width="0.8" opacity="0.6"/>
  <line x1="22" y1="28" x2="42" y2="28" stroke="#9a9590" stroke-width="0.8" opacity="0.6"/>
  <!-- Gold ring -->
  <ellipse cx="32" cy="35" rx="12" ry="3.5" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <!-- Handle -->
  <rect x="29" y="37" width="6" height="16" rx="3" fill="url(#mic)" stroke="#7a7270" stroke-width="1"/>
  <!-- Base -->
  <ellipse cx="32" cy="56" rx="12" ry="4" fill="url(#gold)" stroke="#b06d1e" stroke-width="1"/>
  <!-- Shine on mic head -->
  <ellipse cx="27" cy="16" rx="3" ry="8" fill="white" opacity="0.2" transform="rotate(-10 27 16)"/>
</svg>
